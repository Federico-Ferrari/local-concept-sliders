# 4 concepts × 20 prompts = 80 eval runs.
#
# Vincoli per ogni concept:
#   - 2 o 3 soggetti per immagine
#   - almeno 1 maschio + 1 femmina (concepts people)
#   - almeno 1 cane + 1 gatto (concept furlength_dog)
#   - target_prompt deve essere sottostringa ESATTA del prompt principale
#
# Regola "man vs woman": per target="man", "man" deve apparire PRIMA di
# "woman" nel testo (evita che prompt.index("man") trovi "man" dentro "woman").
#
# Seeds:
#   smile_woman    : 100–119
#   curlyhair_man  : 200–219
#   age_woman      : 300–319
#   furlength_dog  : 400–419
# =============================================================================

