# age_flux_v1_symmetric.yaml
#
# Age slider su Flux nel setting SIMMETRICO (stile v5_symmetric smile):
#   - 10 entries: 5 male x etnie + 5 female x etnie
#   - TUTTE enhance (nessun YAML trick di preservation)
#   - Simmetrico per genere (l'effetto età si applica a chiunque)
#
# Direzione: scale positivo → vecchio (rughe, capelli grigi),
#            scale negativo → giovane (pelle liscia, capelli pieni).
#
# Hyperparameters identici a smile_flux_v5_symmetric per confronto
# apples-to-apples (guidance 4, resolution 512).
# ============================================================

# === 5 enhance MALE entries ===

- target: "male white person"
  positive: "male white person, old, wrinkled skin, gray hair, elderly"
  unconditional: "male white person, young, smooth skin, no wrinkles, youthful"
  neutral: "male white person"
  guidance_scale: 4
  resolution: 512

- target: "male black person"
  positive: "male black person, old, wrinkled skin, gray hair, elderly"
  unconditional: "male black person, young, smooth skin, no wrinkles, youthful"
