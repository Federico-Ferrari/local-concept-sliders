# Age slider on Flux in the SYMMETRIC setting (same style as v5_symmetric smile):
#   - 10 entries: 5 male ethnicity + 5 female ethnicity
#   - ALL enhance (no preservation YAML trick)
#   - Symmetric across gender (the age effect applies to everyone)
#
# Direction: positive scale -> old (wrinkles, grey hair),
#            negative scale -> young (smooth skin, full hair).
#
# Hyperparameters identical to smile_flux_v5_symmetric for an
# apples-to-apples comparison (guidance 4, resolution 512).
# ============================================================

# === 5 enhance MALE entries ===

- target: "male white person"
  positive: "male white person, old, wrinkled skin, gray hair, elderly"
  unconditional: "male white person, young, smooth skin, no wrinkles, youthful"
  neutral: "male white person"
  guidance_scale: 4
  resolution: 512

- target: "male black person"
  positive: "male black person, old, wrinkled skin, gray hair, elderly"
