# vangogh_flux_v1.yaml
#
# Style slider: direzione realismo -> stile Van Gogh.
# Primo style slider del progetto (finora solo attribute sliders: smile,
# age, eyes).
#
# SCOPO: baseline "easy case" per lo spectrum diagnostico.
#   Gli style sliders sono noti per funzionare bene su diffusion models
#   perche' modificano GLOBALMENTE tutta l'immagine (textures, palette,
#   brushstrokes) senza bisogno di binding entity-specifico. Questo e'
#   fundamentally different from attribute sliders, which require
#   localizzazione su un soggetto.
#
# PREDIZIONE: vangogh_flux funziona nettamente meglio di smile/age/eyes
#   in terms of clean application, since there is no
#   di binding da risolvere: lo stile si applica a tutta l'immagine in
#   modo globale.
#
# CONFRONTO ATTESO per tesi:
#   - style slider (van gogh):  baseline alto, funziona bene
#   - subject slider simmetrico (smile v5): medio, serve direzione pulita
#   - subject slider asimmetrico (smile v3/age v1): leakage problem
#
# PROMPT: 10 scene diverse (landscape, portrait, still life, ecc.) con
#   positive="in style of Van Gogh, impasto, swirling brushstrokes" e
#   unconditional="photograph, photorealistic, realistic". Target e
#   neutral sono uguali, senza descrittore di stile (punto neutro).
#
# IPERPARAMETRI:
#   - guidance_scale: 4 (match paper originale)
#   - resolution: 512
#   - rank/alpha/method: rank 16, xattn, alpha 1 (adattamento Flux)
# ============================================================

- target: "a landscape"
  positive: "a landscape in the style of Van Gogh, impasto, swirling brushstrokes, vibrant colors, post-impressionist painting"
  unconditional: "a landscape, photograph, photorealistic, realistic"
  neutral: "a landscape"
  guidance_scale: 4
  resolution: 512

