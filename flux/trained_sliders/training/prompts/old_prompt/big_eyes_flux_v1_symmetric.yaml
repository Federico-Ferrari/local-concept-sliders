# big_eyes_flux_v1_symmetric.yaml
#
# Big-eyes slider su Flux nel SETTING GENERALE del paper Concept Sliders
# (Gandikota et al. 2023):
#   - 10 entries: 5 uomini x etnie + 5 donne x etnie
#   - ALL enhance entries (no preservation YAML trick)
#   - Simmetrico per genere (big/small eyes deve applicarsi a chiunque)
#
# USO: slider "generico" di dimensione occhi. A scale positive gli occhi si
#   allargano, a scale negative si restringono/socchiudono.
#
# PROMPT STRUCTURE (dal paper):
#   target        = soggetto base
#   positive      = soggetto + attributo (big eyes)
#   unconditional = soggetto + counter-attributo (small eyes)
#   neutral       = soggetto base (uguale a target)
#
# IPERPARAMETRI:
#   - guidance_scale: 4 (valore del paper)
#   - resolution: 512
#   - rank 16, xattn, alpha 1 (convenzione nostra per Flux)
# ============================================================

# === 5 enhance MALE entries ===

- target: "male white person"
  positive: "male white person, big eyes, large eyes"
  unconditional: "male white person, small eyes, narrow eyes"
  neutral: "male white person"
  guidance_scale: 4
  resolution: 512

- target: "male black person"
  positive: "male black person, big eyes, large eyes"
  unconditional: "male black person, small eyes, narrow eyes"
  neutral: "male black person"
