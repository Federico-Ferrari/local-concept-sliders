# blue_hair_flux_v1_symmetric.yaml
#
# Blue-hair slider su Flux nel SETTING GENERALE del paper Concept Sliders
# (Gandikota et al. 2023):
#   - 10 entries: 5 uomini x etnie + 5 donne x etnie
#   - ALL enhance entries (no preservation YAML trick)
#   - Simmetrico per genere
#
# SCELTA PROMPT:
#   - positive      = "persona, blue hair"
#   - unconditional = "persona, natural hair color"
#   - neutral       = "persona"
#
#   Razionale: Flux non genera capelli blu nativamente. L'unconditional
#   "natural hair color" ancora la direzione negativa al colore naturale
#   (generico) senza forzare un colore specifico (come "red hair" farebbe).
#   Cosi' il gradiente di training e' robusto (differenza pos/uncond ben
#   definita sul piano colore), ma scale negative producono capelli
#   realistici tipici invece di un singolo colore forzato.
#
#   Expected behaviour:
#     - scale positive -> capelli blu (enhance)
#     - scale zero     -> capelli default di Flux per il soggetto
#     - scale negative -> spinta verso colori naturali generici (se l'input
#                         era gia' naturale, poco effetto; se era vicino al
#                         blu, lo riporta a naturale)
#
# IPERPARAMETRI:
#   - guidance_scale: 4 (paper)
#   - resolution: 512
#   - rank 16, xattn, alpha 1
# ============================================================

# === 5 enhance MALE entries ===

- target: "male white person"
  positive: "male white person, blue hair"
  unconditional: "male white person, natural hair color"
  neutral: "male white person"
  guidance_scale: 4
  resolution: 512

- target: "male black person"
  positive: "male black person, blue hair"
  unconditional: "male black person, natural hair color"
  neutral: "male black person"
