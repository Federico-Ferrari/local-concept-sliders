# sky_day_night_flux_v1.yaml
#
# Global concept slider: direzione giorno <-> notte del cielo.
# Differenza strutturale rispetto a smile_man:
#   - NON c'e' sottoconcetto da preservare (la transizione giorno/notte
#     si applica all'intera scena, non a un sottogruppo)
#   - quindi NON usiamo lo YAML-trick / Eq.7 degenerata
#   - tutte le entries sono enhance puri: positive = giorno, unconditional = notte
#   - scale > 0 -> giorno, scale < 0 -> notte (direzione bidirezionale)
#
# 10 entries: varianti di contesto (landscape/sky/city/beach/forest/
# mountains/field/house/street/desert) per coprire diverse attivazioni
# T5 del concetto "scena con cielo". Tutte portano la stessa direzione
# day<->night, quindi il gradient si sovrappone coerentemente.
#
# Iperparametri identici a smile_man v3/v4 (proven-stable su Flux):
#   - 500 max_train_steps
#   - rank 16, xattn, alpha 1
#   - lr 0.002, warmup 200
#   - eta=2 per tutte (direzione enhance)
#   - save_every 100
#
# Costo computazionale: 3 forward LoRA-off unique per step (target ==
# neutral quindi collassano, rimangono positive e negative distinti),
# +1 LoRA-on. Tempo atteso ~5-6 s/step -> 500 step ~45-55 min.
# ============================================================

- target: "a photo of a landscape"
  positive: "a photo of a landscape, clear blue sky, bright sunny day, daylight, sunlight"
  unconditional: "a photo of a landscape, dark night sky, stars, moonlight, nighttime"
  neutral: "a photo of a landscape"
  guidance_scale: 2
  resolution: 512

- target: "a photo of the sky"
  positive: "a photo of the sky, clear blue daytime sky, bright sun, daylight"
  unconditional: "a photo of the sky, dark night sky, stars, moon, nighttime"
  neutral: "a photo of the sky"
  guidance_scale: 2
  resolution: 512

- target: "a photo of a city"
  positive: "a photo of a city, sunny daytime, bright blue sky, daylight"
  unconditional: "a photo of a city, nighttime, dark sky, city at night"
  neutral: "a photo of a city"
  guidance_scale: 2
  resolution: 512

- target: "a photo of a beach"
  positive: "a photo of a beach, sunny day, clear blue sky, bright sunlight"
  unconditional: "a photo of a beach, nighttime, dark sky, moonlight, stars"
  neutral: "a photo of a beach"
  guidance_scale: 2
  resolution: 512

- target: "a photo of a forest"
  positive: "a photo of a forest, bright daylight, sunny, clear sky"
  unconditional: "a photo of a forest, dark night, moonlight, nighttime"
  neutral: "a photo of a forest"
  guidance_scale: 2
  resolution: 512

- target: "a photo of mountains"
  positive: "a photo of mountains, clear sunny day, blue sky, daylight"
  unconditional: "a photo of mountains, night, dark sky, moonlight, stars"
  neutral: "a photo of mountains"
  guidance_scale: 2
  resolution: 512

- target: "a photo of a field"
  positive: "a photo of a field, sunny daytime, blue sky, daylight"
  unconditional: "a photo of a field, nighttime, dark sky, stars"
  neutral: "a photo of a field"
  guidance_scale: 2
  resolution: 512

- target: "a photo of a house"
  positive: "a photo of a house, sunny day, bright blue sky, daylight"
  unconditional: "a photo of a house, nighttime, dark sky, night scene"
  neutral: "a photo of a house"
  guidance_scale: 2
  resolution: 512

- target: "a photo of a street"
  positive: "a photo of a street, sunny day, daylight, clear blue sky"
  unconditional: "a photo of a street, nighttime, dark, street lights at night"
  neutral: "a photo of a street"
  guidance_scale: 2
  resolution: 512

- target: "a photo of a desert"
  positive: "a photo of a desert, sunny day, clear blue sky, bright sunlight"
  unconditional: "a photo of a desert, starry night, dark sky, moonlight"
  neutral: "a photo of a desert"
  guidance_scale: 2
  resolution: 512
