# --- (E) Espressione preservata (4) — ANTI-AMPLIFICAZIONE ---
# Queste sono le entries chiave della strategia v4: preservano
# esplicitamente volti femminili con espressioni già positive o
# intense, impedendo alla LoRA di spingerli oltre verso bocca
# aperta / risata. Il bug osservato in v3 (smile normale ->
# bocca aperta) dovrebbe essere attaccato da queste.
- target: "a smiling woman"
  positive: "a smiling woman"
  unconditional: "a smiling woman"
  neutral: "a smiling woman"
  guidance_scale: 1
  resolution: 512

- target: "a laughing woman"
  positive: "a laughing woman"
  unconditional: "a laughing woman"
  neutral: "a laughing woman"
  guidance_scale: 1
  resolution: 512

- target: "a serious woman"
  positive: "a serious woman"
  unconditional: "a serious woman"
  neutral: "a serious woman"
  guidance_scale: 1
  resolution: 512

- target: "a woman with a neutral expression"
  positive: "a woman with a neutral expression"
  unconditional: "a woman with a neutral expression"
  neutral: "a woman with a neutral expression"
  guidance_scale: 1
  resolution: 512
