# --- (D) Attributi fisici (3) -------------------------------
- target: "a woman with long hair"
  positive: "a woman with long hair"
  unconditional: "a woman with long hair"
  neutral: "a woman with long hair"
  guidance_scale: 1
  resolution: 512

- target: "a woman with short hair"
  positive: "a woman with short hair"
  unconditional: "a woman with short hair"
  neutral: "a woman with short hair"
