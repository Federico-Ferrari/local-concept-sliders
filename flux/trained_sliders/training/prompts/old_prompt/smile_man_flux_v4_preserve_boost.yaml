  neutral: "an elderly woman"
  guidance_scale: 1
  resolution: 512

# --- (C) Etnia (2) ------------------------------------------
- target: "an Asian woman"
  positive: "an Asian woman"
  unconditional: "an Asian woman"
  neutral: "an Asian woman"
