# Evolution of v3_yaml_trick after diagnosing the leakage observed at
# validation time: the slider trained with 5+5 entries had learned a
# global "smile amplifier" direction that also amplified the smile on
# the isolated woman (switching from a normal smile to an open mouth),
# despite the woman-loss being ~1e-3. Root cause: the preservation via
# the degenerated Concept Sliders objective constrains the LoRA only on
# the few (z_t, prompt) pairs seen during training. For T5-similar but
# not identical prompts (different context, different attributes,
# already-positive expression), the preservation does not transfer.
#
# v4 strategy: keep EVERYTHING the same as v3 except for the woman
# entries, which are expanded from 5 to 15 to cover 5 axes of variation
# in T5 space:
#   1. phrasing / framing (a woman, photo of, portrait, headshot)
#   2. age (young, middle-aged, elderly)
#   3. ethnicity (Asian, Black)
#   4. physical attributes (long hair, glasses)
#   5. preserved expression (smiling, serious, laughing) <- key
#      anti-amplification: with "a smiling woman" as preservation,
#      the LoRA cannot push an already-smiling face into an open
#      mouth without being penalised. Same for "laughing".
#
# The enhance:preservation ratio goes from 50:50 in v3 to 25:75 in v4,
# i.e. for every step on the man-branch there are ~3 preservation steps
# on different woman prompts. The smile direction is still learned (5
# entries x ~25 steps each over 500) but with much less freedom to
# generalise onto female faces.
#
# All other hyperparameters identical to v3:
#   - 500 max_train_steps (clean comparison with v3)
#   - rank 16, xattn, alpha 1
#   - lr 0.002, warmup 200
#   - eta=2 on man, eta=1 on woman (irrelevant under the YAML trick)
#   - save_every 100
#
# ============================================================
# MAN entries (5) — INVARIATE da v3. Gradient spinge smile direction.
# ============================================================

- target: "a man"
  positive: "a man, smiling, happy face, big smile"
  unconditional: "a man, frowning, grumpy, sad"
  neutral: "a man"
  guidance_scale: 2
  resolution: 512

- target: "a man"
  positive: "a man, grinning, joyful expression, toothy smile"
  unconditional: "a man, scowling, unhappy expression, mouth closed"
  neutral: "a man"
  guidance_scale: 2
  resolution: 512

- target: "portrait of a man"
  positive: "portrait of a man, smiling, happy face, big smile"
  unconditional: "portrait of a man, frowning, grumpy, sad"
  neutral: "portrait of a man"
  guidance_scale: 2
  resolution: 512

- target: "photo of a man"
  positive: "photo of a man, smiling, happy face, big smile"
  unconditional: "photo of a man, frowning, grumpy, sad"
  neutral: "photo of a man"
  guidance_scale: 2
  resolution: 512

- target: "a young man"
  positive: "a young man, smiling, happy face, big smile"
  unconditional: "a young man, frowning, grumpy, sad"
  neutral: "a young man"
  guidance_scale: 2
  resolution: 512

# ============================================================
# WOMAN entries (15) — Eq.7 degenerata -> preservation pura su
# ampio spettro di attivazioni T5. 5 dimensioni × ~3 varianti.
# target == positive == unconditional == neutral per ogni entry.
# ============================================================

# --- (A) Phrasing/framing base (3) ---------------------------
- target: "a woman"
  positive: "a woman"
  unconditional: "a woman"
  neutral: "a woman"
  guidance_scale: 1
  resolution: 512

- target: "photo of a woman"
  positive: "photo of a woman"
  unconditional: "photo of a woman"
  neutral: "photo of a woman"
  guidance_scale: 1
  resolution: 512

- target: "portrait of a woman"
  positive: "portrait of a woman"
  unconditional: "portrait of a woman"
  neutral: "portrait of a woman"
  guidance_scale: 1
  resolution: 512

# --- (B) Age (3) --------------------------------------------
- target: "a young woman"
  positive: "a young woman"
  unconditional: "a young woman"
  neutral: "a young woman"
  guidance_scale: 1
  resolution: 512

- target: "a middle-aged woman"
