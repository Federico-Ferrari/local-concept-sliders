# Realistic-to-painterly slider — SDXL v1
#
# General scene slider: positive=painterly/artistic, unconditional=hyperrealistic photo.
# 10 entries across diverse scene types.

prompts_file: "sdxl/trained_sliders/training/prompts/new_prompt/painterly_sdxl_v1.yaml"
pretrained_model:
  name_or_path: "stabilityai/stable-diffusion-xl-base-1.0"
  v2: false
  v_pred: false
network:
  type: "c3lier"
  rank: 4
  alpha: 1.0
  training_method: "noxattn"
train:
  precision: "bfloat16"
  noise_scheduler: "ddim"
  iterations: 1000
  lr: 0.0002
  optimizer: "AdamW"
  lr_scheduler: "constant"
  max_denoising_steps: 50
save:
  name: "painterly_sdxl_v1"
  path: "sdxl/trained_sliders/sliders"
  per_steps: 500
  precision: "bfloat16"
logging:
  use_wandb: false
  verbose: false
other:
  use_xformers: true
