# Van Gogh style slider — SDXL v2
#
# CAMBIAMENTI rispetto a v1 (vangogh_sky_sdxl_v1):
#   - guidance_scale 4 nei prompt (era 1)
#   - target/neutral neutri (non pittorici)
#   - stile globale (non solo cielo)

prompts_file: "sdxl/trained_sliders/training/prompts/new_prompt/vangogh_sdxl_v2.yaml"
pretrained_model:
  name_or_path: "stabilityai/stable-diffusion-xl-base-1.0"
  v2: false
  v_pred: false
network:
  type: "c3lier"
  rank: 16
  alpha: 1.0
  training_method: "noxattn"
train:
  precision: "bfloat16"
  noise_scheduler: "ddim"
  iterations: 1000
  lr: 0.0002
  optimizer: "AdamW"
  lr_scheduler: "constant"
  max_denoising_steps: 50
save:
  name: "vangogh_sdxl_v2"
  path: "sdxl/trained_sliders/sliders"
  per_steps: 500
  precision: "bfloat16"
logging:
  use_wandb: false
  verbose: false
other:
  use_xformers: true
