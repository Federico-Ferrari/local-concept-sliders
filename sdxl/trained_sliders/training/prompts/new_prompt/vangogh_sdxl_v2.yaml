# vangogh_sdxl_v2.yaml
#
# Style slider SDXL v2: direzione realismo → stile Van Gogh (globale, non solo cielo).
#
# CAMBIAMENTI rispetto a v1:
#   - guidance_scale: 4 (era 1 → direzione troppo debole)
#   - target/neutral NEUTRI: "a landscape", "a portrait", ecc.
#     (v1 usava "a village with a night sky" → già pittorici, nessun delta)
#   - stile generale Van Gogh (non solo sky), coerente con vangogh_flux_v1
#   - 10 soggetti diversi: landscape, portrait, still life, wheat field,
#     starry night, cafe, cypress, village street, vase of flowers, mountain
#
# Direzione appresa:
#   positive      = soggetto in stile Van Gogh (impasto, pennellate, post-impressionismo)
#   unconditional = soggetto fotografico/realistico
#   target/neutral = soggetto neutro (nessun descrittore di stile)
#
# Interpretazione scale a inferenza:
#   scale > 0  →  stile Van Gogh
#   scale < 0  →  iper-fotografico/realistico
#   scale = 0  →  modello base
#
# guidance_scale: 4  — match paper originale Gandikota et al., forza direzione 4×.
# rank 16            — stile visivo complesso, rank 4 insufficiente.

- target: "a landscape"
  positive: "a landscape in the style of Van Gogh, impasto, swirling brushstrokes, vibrant colors, post-impressionist painting"
  unconditional: "a landscape, photograph, photorealistic, realistic"
  neutral: "a landscape"
  action: "enhance"
  guidance_scale: 4
  resolution: 512
  dynamic_resolution: false
  batch_size: 1

- target: "a portrait of a person"
  positive: "a portrait of a person in the style of Van Gogh, impasto, expressive brushstrokes, post-impressionist"
  unconditional: "a portrait of a person, photograph, photorealistic, realistic"
