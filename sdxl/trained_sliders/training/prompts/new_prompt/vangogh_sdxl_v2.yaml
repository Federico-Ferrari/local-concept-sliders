# SDXL style slider v2: realism -> Van Gogh style (global, not only sky).
#
# Changes vs v1:
#   - guidance_scale: 4 (was 1 -> direction too weak)
#   - NEUTRAL target/neutral: "a landscape", "a portrait", ...
#     (v1 used "a village with a night sky", already pictorial, so the
#      delta was small)
#   - General Van Gogh style (not only sky), consistent with vangogh_flux_v1
#   - 10 different subjects: landscape, portrait, still life, wheat field,
#     starry night, cafe, cypress, village street, vase of flowers, mountain
#
# Learned direction:
#   positive       = subject in Van Gogh style (impasto, brushstrokes, post-impressionist)
#   unconditional  = photographic / realistic subject
#   target/neutral = neutral subject (no style descriptor)
#
# Inference interpretation of the scale:
#   scale > 0  ->  Van Gogh style
#   scale < 0  ->  hyper-photographic / realistic
#   scale = 0  ->  base model
#
# guidance_scale: 4  -- matches the original Concept Sliders setup, 4x boost.
# rank 16            -- complex visual style; rank 4 was insufficient.

- target: "a landscape"
  positive: "a landscape in the style of Van Gogh, impasto, swirling brushstrokes, vibrant colors, post-impressionist painting"
  unconditional: "a landscape, photograph, photorealistic, realistic"
  neutral: "a landscape"
  action: "enhance"
  guidance_scale: 4
  resolution: 512
  dynamic_resolution: false
  batch_size: 1

