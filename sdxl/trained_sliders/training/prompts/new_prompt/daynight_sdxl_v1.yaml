# Day-to-night slider — SDXL v1 — general scenes
#
# Positive pole: night / dark lighting.
# Unconditional pole: day / bright lighting.
# 10 entries across diverse scene types for disentanglement
# (same structure as age_person_sdxl_v1.yaml).

- target: a landscape
  positive: a landscape, night, dark sky, moonlight, stars
  unconditional: a landscape, daytime, bright sunlight, blue sky
  neutral: a landscape
  guidance_scale: 4
  action: enhance
  resolution: 1024
  dynamic_resolution: false
  batch_size: 1

