# Fur length slider — SDXL v1 — dogs only
#
# Goal: the LoRA learns to change fur length ONLY on dogs.
# Strategy:
#   - Dog entries (10): standard fur direction (positive=long, unconditional=short).
#   - Cat entries (5): zero direction (positive=unconditional=neutral) — LoRA learns no change.
#
# Dog: 5 breeds/types x 2 synonym variants = 10 entries
# Cat: 5 types x 1 neutral entry           =  5 entries
# Total: 15 entries

# ── DOG: fur length direction ─────────────────────────────────────────────────

- target: a dog
  positive: a dog, long fur, fluffy coat, long-haired
  unconditional: a dog, short fur, shorthaired, smooth coat
  neutral: a dog
  guidance_scale: 4
  action: enhance
  resolution: 1024
  dynamic_resolution: false
  batch_size: 1

- target: a dog
  positive: a dog, very long fur, extremely fluffy coat, long-haired
  unconditional: a dog, very short fur, trimmed coat, shorthaired
  neutral: a dog
  guidance_scale: 4
  action: enhance
  resolution: 1024
  dynamic_resolution: false
  batch_size: 1

