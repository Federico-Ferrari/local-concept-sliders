# Age slider — SDXL v1 — women only
#
# Goal: the LoRA learns to age ONLY women.
# Strategy:
#   - Female entries (10): standard age direction (positive=old, unconditional=young).
#   - Male entries (5): positive = unconditional = neutral = target.
#     Since (positive - unconditional) = 0, the loss pushes the LoRA to produce
#     no change for males. The model learns: "for males, do nothing."
#
# Female: 5 ethnicities x 2 synonym variants = 10 entries
# Male:   5 ethnicities x 1 neutral entry    =  5 entries
# Total: 15 entries

# ── FEMALE: age direction ─────────────────────────────────────────────────────

- target: female white person
  positive: female white person, very old, wrinkly, gray hair, aged skin
  unconditional: female white person, very young, smooth skin, youthful
  neutral: female white person
  guidance_scale: 4
  action: enhance
  resolution: 1024
  dynamic_resolution: false
  batch_size: 1

- target: female white person
  positive: female white person, elderly, wrinkled face, white hair
  unconditional: female white person, young, fresh face, no wrinkles
  neutral: female white person
  guidance_scale: 4
  action: enhance
  resolution: 1024
  dynamic_resolution: false
  batch_size: 1

