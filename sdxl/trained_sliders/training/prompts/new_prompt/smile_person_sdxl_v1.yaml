# Smile slider — SDXL v1 — all persons
#
# Identical prompts to the original repo's prompts-smile_slider_GPT.yaml,
# adapted for SDXL: resolution 1024, guidance_scale field name.
# 10 entries: 5 ethnicities x 2 genders.

- target: male white person
  positive: male white person, smiling, happy face, big smile
  unconditional: male white person, frowning, grumpy, sad
  neutral: male white person
  guidance_scale: 4
  action: enhance
  resolution: 1024
  dynamic_resolution: false
  batch_size: 1

