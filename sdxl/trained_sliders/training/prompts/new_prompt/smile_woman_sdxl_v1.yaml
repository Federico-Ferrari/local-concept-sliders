# Smile slider — SDXL v1 — women only
#
# Goal: the LoRA learns to make ONLY women smile.
# Strategy:
#   - Female entries (12): standard smile direction, same prompts as repo original.
#   - Male entries (5): positive = unconditional = neutral = target.
#     Since (positive - unconditional) = 0, the loss pushes the LoRA to produce
#     no change for males. The model learns: "for males, do nothing."
#
# Female: 5 ethnicities x 2 synonym variants = 10 entries
# Male:   5 ethnicities x 1 neutral entry    =  5 entries
# Total: 15 entries

# ── FEMALE: smile direction ──────────────────────────────────────────────────

- target: female white person
  positive: female white person, smiling, happy face, big smile
  unconditional: female white person, frowning, grumpy, sad
  neutral: female white person
  guidance_scale: 4
  action: enhance
  resolution: 1024
  dynamic_resolution: false
  batch_size: 1

- target: female white person
  positive: female white person, smiling, cheerful, joyful
  unconditional: female white person, serious, neutral expression
  neutral: female white person
  guidance_scale: 4
  action: enhance
  resolution: 1024
  dynamic_resolution: false
  batch_size: 1

