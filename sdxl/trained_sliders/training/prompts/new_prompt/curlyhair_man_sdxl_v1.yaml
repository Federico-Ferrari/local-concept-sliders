# Curly hair slider — SDXL v1 — men only
#
# Goal: the LoRA learns to make ONLY men have curly hair.
# Strategy:
#   - Male entries (10): standard curly direction (positive=curly, unconditional=straight).
#   - Female entries (5): zero direction (positive=unconditional=neutral) — LoRA learns no change.
#
# Male: 5 ethnicities x 2 synonym variants = 10 entries
# Female: 5 ethnicities x 1 neutral entry  =  5 entries
# Total: 15 entries

# ── MALE: curly direction ─────────────────────────────────────────────────────

- target: male white person
  positive: male white person, curly hair, wavy hair, tight curls
  unconditional: male white person, straight hair, smooth hair, sleek
  neutral: male white person
  guidance_scale: 4
  action: enhance
  resolution: 1024
  dynamic_resolution: false
  batch_size: 1

