# Spatial Concept Slider — smile slider anchored to "man", v2 with guidance_scale=4.
#
# Twin of smile_man_strong_v2.yaml: byte-identical 10-entry preservation set
# (5 ethnicities × 2 phrasing variants, anchored to "man"), the ONLY difference
# is `guidance_scale: 4` instead of 1.
#
# Hypothesis being tested: Gandikota's YAMLs write `guidance: 4` (buggy
# pydantic key → silently dropped → effective training value is 1.0, verified
# empirically). The published smiling.pt was therefore trained at gs=1.
# The paper's stated intent, though, suggests they meant gs=4. A previous
# training attempt of ours with gs=4 on 5 entries produced an off-manifold
# saturated slider (asymmetric +/− response, weak enhance).
#
# Open question this experiment asks: does a 10-entry preservation set average
# out the per-iteration off-manifold pull enough that gs=4 becomes trainable
# cleanly? If yes, we'd recover ~4× the ΔW norm compared to v2 gs=1,
# potentially matching or beating Gandikota's reference strength while
# keeping the "man" anchor's localization.
#
# Run alongside v2 (gs=1) for a controlled ablation: gs is the only
# variable changed between the two YAMLs.

# ============================================================
# variant A — "smiling / frowning" (matches upstream phrasing)
# ============================================================

- target: "white man"
  positive: "white man, smiling, happy face, big smile"
  unconditional: "white man, frowning, grumpy, sad"
  neutral: "white man"
  action: "enhance"
  guidance_scale: 4
  resolution: 512
  dynamic_resolution: false
  batch_size: 1

- target: "black man"
  positive: "black man, smiling, happy face, big smile"
  unconditional: "black man, frowning, grumpy, sad"
  neutral: "black man"
  action: "enhance"
  guidance_scale: 4
  resolution: 512
  dynamic_resolution: false
  batch_size: 1

- target: "asian man"
  positive: "asian man, smiling, happy face, big smile"
  unconditional: "asian man, frowning, grumpy, sad"
  neutral: "asian man"
  action: "enhance"
