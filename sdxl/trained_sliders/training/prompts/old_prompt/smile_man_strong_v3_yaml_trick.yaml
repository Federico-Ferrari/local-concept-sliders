# Spatial Concept Slider — v3 YAML-trick variant.
#
# Same goal as v3_preserve_woman (localize smile on man, leave woman
# unchanged) but via a completely different implementation path: we
# exploit the Eq.7 enhance loss's own structure to embed the
# preservation signal inside the standard upstream training loop,
# without touching train.py at all.
#
# How the trick works:
#
# The enhance loss is
#   MSE(target_with_LoRA,  neutral + guidance_scale * (positive - unconditional))
# where neutral, positive, unconditional are no-grad teacher predictions
# from the frozen UNet (LoRA off).
#
# If we set positive == unconditional (same string), then
#   positive - unconditional = 0
# because both are encoded and decoded identically by the frozen UNet,
# regardless of guidance_scale. And if we set neutral == target (same
# string), then
#   neutral = target_without_LoRA
# (frozen UNet prediction for that prompt). So the loss collapses to
#   MSE(target_with_LoRA, target_without_LoRA)
# — exactly the preservation signal: "don't let the LoRA change this
# prompt's prediction". No code changes needed.
#
# Per iteration, train.py samples one prompt_pair uniformly at random.
# With 10 man entries (enhance, real gradient) and 10 woman entries
# (preservation, degenerate loss), sampling gives 50/50 split → roughly
# equivalent to lambda_pres = 1.0 in the two-term formulation of
# train_with_preservation.py (which computes both every iteration).
# Cost per iteration ≈ upstream v2_guidance4, not 2× like the
# modified-loss variant.
#
# The 10 woman entries mirror the 10 man entries in structure:
# 5 ethnicities × 2 "variants" (bare noun / "portrait" variant). Both
# woman variants share the SAME preservation effect — the variant
# phrasing just expands the set of woman-activated UNet features the
# LoRA is forced to leave alone, analogously to how the man YAML
# doubles phrasing for diversity (smiling/grinning).
#
# Direct comparison with v3_preserve_woman:
#   - same hyperparams (rank 4, alpha 1.0, noxattn, 1000 iter, lr 2e-4)
#   - same man enhance entries (10, gs=4)
#   - same goal (preserve woman)
#   - different mechanism:
#       v3_yaml_trick     → preservation comes for free via Eq.7,
#                           sampled one-at-a-time per iteration
#       v3_preserve_woman → preservation is a separate MSE term summed
#                           into the loss every iteration
# If both produce the same outcome, we've established the equivalence
# empirically and the YAML trick is preferable (cheaper, no script
# fork). If the explicit two-term loss outperforms, we've shown the
# trick is a diluted approximation and the explicit formulation pays
# off in convergence quality.

# ============================================================
# MAN entries — real enhance loss, gradient drives smile direction.
# Byte-identical to smile_man_strong_v2_guidance4.yaml.
# ============================================================

# --- variant A: "smiling / frowning" ---

- target: "white man"
  positive: "white man, smiling, happy face, big smile"
  unconditional: "white man, frowning, grumpy, sad"
  neutral: "white man"
  action: "enhance"
  guidance_scale: 4
  resolution: 512
  dynamic_resolution: false
  batch_size: 1

- target: "black man"
  positive: "black man, smiling, happy face, big smile"
  unconditional: "black man, frowning, grumpy, sad"
  neutral: "black man"
  action: "enhance"
  guidance_scale: 4
  resolution: 512
  dynamic_resolution: false
  batch_size: 1

- target: "asian man"
  positive: "asian man, smiling, happy face, big smile"
  unconditional: "asian man, frowning, grumpy, sad"
  neutral: "asian man"
  action: "enhance"
  guidance_scale: 4
  resolution: 512
  dynamic_resolution: false
  batch_size: 1

- target: "hispanic man"
  positive: "hispanic man, smiling, happy face, big smile"
  unconditional: "hispanic man, frowning, grumpy, sad"
  neutral: "hispanic man"
  action: "enhance"
