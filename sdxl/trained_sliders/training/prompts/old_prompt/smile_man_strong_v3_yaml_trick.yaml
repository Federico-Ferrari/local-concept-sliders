# ============================================================
# WOMAN entries — loss degenerates to MSE(target_with_LoRA, target_without_LoRA).
# Eq.7 enhance with positive == unconditional == neutral == target:
#   positive - unconditional = 0
#   neutral = target_without_LoRA
# → loss = MSE(target_with_LoRA, target_without_LoRA).
# guidance_scale value is irrelevant because the (positive - unconditional)
# term is zero regardless; we leave it at 1 for clarity.
# ============================================================

