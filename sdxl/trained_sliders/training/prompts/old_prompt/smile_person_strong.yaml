# Gandikota smile slider — reference replica anchored to "person".
#
# This YAML is a byte-identical replica of Gandikota et al.'s official
# trainscripts/textsliders/data/prompts-smile_slider_GPT.yaml, WITH ONE
# correction: their upstream file writes `guidance: 4`, which pydantic
# silently drops because the correct key is `guidance_scale`. We therefore
# write `guidance_scale: 1` to match the EFFECTIVE value their training
# actually used (verified empirically: see comment in smile_man_strong.yaml).
#
# Scientific purpose: this is the baseline against which smile_man_strong
# should be compared. Everything — 10 entries, 5 ethnicities × M/F, stacked
# adjectives in positive/unconditional, action=enhance, resolution 512 — is
# identical to the author's recipe. ONLY the anchor token differs between the
# two experiments:
#     smile_person_strong (this file):   target = "{gender} {ethnicity} person"
#     smile_man_strong:                   target = "{ethnicity} man"
#
# Therefore any behavioural difference between the two resulting LoRAs, when
# applied to the same prompt with the same seed, is attributable entirely to
# the anchor choice. That is the thesis variable.

- target: "male white person"
  positive: "male white person, smiling, happy face, big smile"
  unconditional: "male white person, frowning, grumpy, sad"
  neutral: "male white person"
  action: "enhance"
  guidance_scale: 1
  resolution: 512
  dynamic_resolution: false
  batch_size: 1

- target: "male black person"
  positive: "male black person, smiling, happy face, big smile"
  unconditional: "male black person, frowning, grumpy, sad"
  neutral: "male black person"
  action: "enhance"
  guidance_scale: 1
  resolution: 512
  dynamic_resolution: false
  batch_size: 1

